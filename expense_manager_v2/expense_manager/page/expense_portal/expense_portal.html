<div class="expense-portal">
  <!-- Toast Container -->
  <div class="ep-toast-wrap" id="ep-toast-wrap"></div>

  <div class="ep-shell">
    <!-- ========== SIDEBAR ========== -->
    <aside class="ep-sidebar" id="ep-sidebar">
      <div class="ep-sidebar-logo">
        <div class="ep-sidebar-logo-icon">B</div>
        <span class="ep-sidebar-logo-text">Bizaxl</span>
      </div>

      <nav class="ep-nav" id="ep-nav">
        <div class="ep-nav-item active" data-view="dashboard" id="nav-dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 9.75L12 3l9 6.75V21H15v-6H9v6H3V9.75z"/>
          </svg>
          <span>Dashboard</span>
        </div>

        <div class="ep-nav-item" data-view="new-claim" id="nav-new-claim">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          <span>New Expense</span>
        </div>

        <div class="ep-nav-item" data-view="my-claims" id="nav-my-claims">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <span>My Claims</span>
        </div>

        <div class="ep-nav-item ep-manager-only" data-view="manager-queue" id="nav-manager-queue" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
          </svg>
          <span>Manager Queue</span>
        </div>

        <div class="ep-nav-item" data-view="analytics" id="nav-analytics">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
          </svg>
          <span>Analytics</span>
        </div>

      <div class="ep-sidebar-user" id="ep-sidebar-user">
        <div class="ep-avatar" id="ep-avatar-initials">?</div>
        <div>
          <div class="ep-user-name" id="ep-user-name">Loading…</div>
          <div class="ep-user-role" id="ep-user-role">—</div>
        </div>
      </div>
    </aside>

    <!-- ========== MAIN AREA ========== -->
    <div class="ep-main">
      <!-- Topbar -->
      <div class="ep-topbar">
        <h1 class="ep-page-title" id="ep-page-title">Dashboard</h1>
        <div class="ep-topbar-actions">
          <button class="btn btn-primary btn-sm" id="btn-new-claim-top">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            New Expense
          </button>
        </div>
      </div>

      <!-- Content -->
      <div class="ep-content" id="ep-content">
        <!-- Views are injected here by JS -->
      </div>
    </div>
  </div>
</div>
